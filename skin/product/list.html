<!--@layout(/layout/basic/layout.html)-->

<div class="product-list-page">
  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">Shop</h1>
  </div>

  <!-- Category Filters -->
  <div class="category-filters">
    <div class="filter-pills">
      <a href="#" class="filter-pill active">All</a>
      <a href="#" class="filter-pill">Outerwear</a>
      <a href="#" class="filter-pill">Dresses</a>
      <a href="#" class="filter-pill">Skirts</a>
      <a href="#" class="filter-pill">Tops</a>
      <a href="#" class="filter-pill">Pants</a>
      <a href="#" class="filter-pill">Knitwear</a>
      <a href="#" class="filter-pill">Accessories</a>
    </div>
    <div class="filter-actions">
      <button class="btn-filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="8" y1="12" x2="20" y2="12"/>
          <line x1="12" y1="18" x2="20" y2="18"/>
        </svg>
        Filter
      </button>
      <button class="btn-filter">
        Sort
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Product Grid -->
  <div module="product_list_1">
    <div class="product-listing-grid">
      <div class="product-listing-card">
        <a href="{$product_link}">
          <div class="product-listing-image">
            <img src="{$product_image_medium}" alt="{$product_name}">
            <button class="wishlist-btn" aria-label="Add to wishlist">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 21C12 21 3 13.5 3 8.5 3 5.4 5.4 3 8.5 3c1.7 0 3.4.8 3.5 2.1C12.1 3.8 13.8 3 15.5 3 18.6 3 21 5.4 21 8.5 21 13.5 12 21 12 21z"/>
              </svg>
            </button>
            <button class="quick-add-btn" aria-label="Quick add">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </a>
        <div class="product-listing-info">
          <a href="{$product_link}">
            <p class="product-name">{$product_name}</p>
          </a>
          <p class="product-price">{$product_price}</p>
        </div>
      </div>
      <div class="product-listing-card">

              </svg>

            <button class="quick-add-btn" aria-label="Quick add">

  <div class="pagination">
    <a href="#" class="pagination-prev">&larr;</a>
    <a href="#" class="pagination-num active">1</a>
    <a href="#" class="pagination-num">2</a>
    <a href="#" class="pagination-num">3</a>
    <a href="#" class="pagination-next">&rarr;</a>
  </div>
